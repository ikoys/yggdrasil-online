<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Yggdrasil Online</title>
<link rel="stylesheet" href="src/style.css" />
</head>
<body>

<!-- PORTRAIT LOCK OVERLAY -------------------------------------------------->
<div id="rotate-prompt">
  <div class="rp-icon">📱</div>
  <div class="rp-msg">Please rotate your device<br>to landscape mode</div>
</div>

<!-- LANDING ---------------------------------------------------------------->
<div id="s-auth">
  <span class="a-leaf">🍃</span>
  <span class="a-ygg">YGG</span>
  <div class="a-sub">Yggdrasil Online</div>
  <div class="a-box">
    <div class="a-ttl">⟨ Enter the World ⟩</div>
    <button class="btn-g"  onclick="CharCreate.show('google')">Continue with Google</button>
    <div class="a-note">Progress saved across all devices.</div>
    <hr class="a-divider" />
    <button class="btn-gs" onclick="Auth.guest()">⟩ Play as Guest ⟨</button>
    <div class="a-note">Guest progress saved locally only.</div>
  </div>
</div>

<!-- CHARACTER CREATION ----------------------------------------------------->
<div class="screen hidden" id="s-create">
  <div class="cc-wrap">

    <!-- LEFT: 3D model viewport -->
    <div class="cc-viewport">
      <canvas id="model-canvas"></canvas>
      <div class="cc-class-badge">⚔ SWORDSMAN</div>
    </div>

    <!-- RIGHT: controls panel -->
    <div class="cc-panel">
      <div class="cc-ttl">Create Character</div>

      <div class="cc-field">
        <label class="cc-lbl" for="char-name">Character Name</label>
        <input type="text" id="char-name" class="cc-inp"
               placeholder="Enter your name…" maxlength="20"
               autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>

      <div class="cc-field">
        <label class="cc-lbl">Skin Tone</label>
        <div class="cc-colors" id="color-picker">
          <div class="cc-color selected" style="background:#fff0e6" data-color="#fff0e6" onclick="CharCreate.selectColor(this)"></div>
          <div class="cc-color"          style="background:#f4d4b0" data-color="#f4d4b0" onclick="CharCreate.selectColor(this)"></div>
          <div class="cc-color"          style="background:#d4a574" data-color="#d4a574" onclick="CharCreate.selectColor(this)"></div>
          <div class="cc-color"          style="background:#b8860b" data-color="#b8860b" onclick="CharCreate.selectColor(this)"></div>
          <div class="cc-color"          style="background:#8b6914" data-color="#8b6914" onclick="CharCreate.selectColor(this)"></div>
        </div>
      </div>

      <div class="cc-spacer"></div>

      <div class="cc-btns">
        <button class="cc-btn cc-back"   onclick="Auth.backToLogin()">← Back</button>
        <button class="cc-btn cc-create" onclick="CharCreate.submit()">Create</button>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     GAME WORLD
════════════════════════════════════════════════════════════════════════ -->
<div id="s-game">

  <!-- Main 3D canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Loading overlay (shown while town + character GLBs load) -->
  <div id="loading-overlay">
    <div class="lo-inner">
      <div class="lo-leaf">🍃</div>
      <div class="lo-title">Yggdrasil Online</div>
      <div class="lo-msg">Entering the Nine Realms…</div>
      <div class="lo-bar"><div class="lo-fill"></div></div>
    </div>
  </div>

  <!-- HUD — top-left character info -->
  <div class="hud-topleft">
    <div class="hud-nameplate">
      <span class="hud-charname" id="hud-name">HERO</span>
      <span class="hud-charclass">⚔ SWORDSMAN</span>
    </div>
    <div class="hud-hprow">
      <span class="hud-hplabel">HP</span>
      <div class="hud-healthbar">
        <div class="hud-health-fill" style="width:100%"></div>
      </div>
      <span class="hud-hpnum">100</span>
    </div>
  </div>

  <!-- Controls hint — fades out after first keypress -->
  <div class="hud-hint" id="controls-hint">
    <span class="hint-key">W A S D</span> Move &nbsp;·&nbsp;
    <span class="hint-key">Drag</span> Rotate Camera
  </div>

  <!-- ── MOBILE CONTROLS ── -->

  <!-- Left half: virtual joystick -->
  <div id="joystick-zone">
    <div id="joystick-knob"></div>
  </div>

  <!-- Right half: camera rotation drag area -->
  <div id="cam-rotate-zone"></div>

</div><!-- /#s-game -->


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>window.THREE = THREE;</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="src/app.js"></script>
</body>
</html>
